<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Superorganism</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            body {
                background: #0e0e14;
                color: #e0e0e0;
                font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* ── Card deck ── */
            .deck-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                perspective: 1200px;
                padding-bottom: 120px; /* space for bottom bars */
            }

            @keyframes dance {
                0%   { transform: rotateY(-15deg) rotateX(10deg) translateZ(0px); }
                50%  { transform: rotateY(15deg) rotateX(-5deg) translateZ(100px); }
                100% { transform: rotateY(-15deg) rotateX(10deg) translateZ(0px); }
            }

            .deck {
                display: flex;
                gap: 20px;
                transform-style: preserve-3d;
                animation: dance 6s ease-in-out infinite;
            }

            .card {
                width: 300px;
                height: 400px;
                border-radius: 16px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
                overflow: hidden;
                transform-style: preserve-3d;
                transition: transform 0.3s ease;
            }

            .card:nth-child(1) { animation: wave 4s infinite -1s; }
            .card:nth-child(2) { animation: wave 4s infinite -2s; }
            .card:nth-child(3) { animation: wave 4s infinite -3s; }

            @keyframes wave {
                0%, 100% { transform: translateY(0); }
                50%      { transform: translateY(-20px) rotateZ(2deg); }
            }

            /* ── Bottom UI ── */
            #bottom-ui {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
            }

            /* Busy indicator */
            #busy-indicator {
                height: 0;
                overflow: hidden;
                background: #1a1a24;
                border-top: 1px solid #333;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                transition: height 0.3s ease;
            }

            #busy-indicator.active {
                height: 36px;
            }

            #busy-label {
                font-size: 12px;
                color: #8888aa;
                letter-spacing: 0.5px;
            }

            @keyframes shimmer {
                0%   { background-position: -200px 0; }
                100% { background-position: 200px 0; }
            }

            .shimmer-bar {
                width: 120px;
                height: 4px;
                border-radius: 2px;
                background: linear-gradient(
                    90deg,
                    #1a73e8 0%,
                    #e84a1a 25%,
                    #1ae85c 50%,
                    #1a73e8 75%,
                    #e84a1a 100%
                );
                background-size: 200px 100%;
                animation: shimmer 1.5s infinite linear;
            }

            @keyframes pulse-dot {
                0%, 100% { opacity: 0.3; }
                50%      { opacity: 1; }
            }

            .thinking-dots {
                display: flex;
                gap: 4px;
            }

            .thinking-dots span {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #1a73e8;
                animation: pulse-dot 1.2s infinite;
            }

            .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
            .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

            /* Input bar */
            #input-bar {
                background: #1a1a24;
                border-top: 1px solid #333;
                padding: 8px 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            #input-icon {
                font-size: 16px;
                color: #1a73e8;
                flex-shrink: 0;
            }

            #input-field {
                flex: 1;
                background: #2a2a36;
                border: 1px solid #444;
                border-radius: 8px;
                padding: 8px 12px;
                color: #e0e0e0;
                font-family: inherit;
                font-size: 14px;
                outline: none;
                transition: border-color 0.2s;
            }

            #input-field:focus {
                border-color: #1a73e8;
            }

            #input-field::placeholder {
                color: #555;
            }

            #send-btn {
                background: #1a73e8;
                border: none;
                border-radius: 8px;
                padding: 8px 16px;
                color: white;
                font-family: inherit;
                font-size: 14px;
                cursor: pointer;
                flex-shrink: 0;
                transition: background 0.2s;
            }

            #send-btn:hover {
                background: #1558b3;
            }

            #send-btn:active {
                background: #0d3d80;
            }

            /* Status bar */
            #status-bar {
                background: #16161e;
                height: 24px;
                display: flex;
                align-items: center;
                padding: 0 12px;
                font-size: 11px;
                color: #666;
                gap: 12px;
            }

            .status-section {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #e84a1a;
                transition: background 0.3s;
            }

            .status-dot.connected {
                background: #1ae85c;
            }

            #status-connection {
                flex-shrink: 0;
            }

            #status-tasks {
                flex: 1;
                text-align: center;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            #status-model {
                flex-shrink: 0;
                text-align: right;
            }

            /* ── Response area ── */
            #response-area {
                position: fixed;
                bottom: 120px;
                left: 50%;
                transform: translateX(-50%);
                width: min(90vw, 800px);
                max-height: 300px;
                overflow-y: auto;
                background: #1a1a24;
                border: 1px solid #333;
                border-radius: 12px;
                padding: 16px;
                font-size: 14px;
                line-height: 1.6;
                color: #ccc;
                display: none;
                z-index: 50;
            }

            #response-area.visible {
                display: block;
            }

            #response-area .token {
                color: #e0e0e0;
            }
        </style>
    </head>
    <body>
        <div class="deck-container">
            <div class="deck">
                <div class="card"><x-shader></x-shader></div>
                <div class="card"><x-shader></x-shader></div>
                <div class="card"><x-shader></x-shader></div>
            </div>
        </div>

        <!-- Response area -->
        <div id="response-area"></div>

        <!-- Bottom UI -->
        <div id="bottom-ui">
            <!-- Busy indicator -->
            <div id="busy-indicator">
                <div class="thinking-dots">
                    <span></span><span></span><span></span>
                </div>
                <span id="busy-label">thinking remotely...</span>
                <div class="shimmer-bar"></div>
            </div>

            <!-- Input bar -->
            <div id="input-bar">
                <span id="input-icon">&#9672;</span>
                <input id="input-field" type="text" placeholder="Ask the superorganism..." autocomplete="off" />
                <button id="send-btn">Send</button>
            </div>

            <!-- Status bar -->
            <div id="status-bar">
                <div class="status-section" id="status-connection">
                    <div class="status-dot" id="connection-dot"></div>
                    <span id="connection-label">Disconnected</span>
                </div>
                <div class="status-section" id="status-tasks">
                    <span id="tasks-label">No active tasks</span>
                </div>
                <div class="status-section" id="status-model">
                    <span id="model-label">auto</span>
                </div>
            </div>
        </div>

        <script type="module">
            import init, { Renderer } from "./pkg/xenomolt.js";

            // Web component: creates canvas in shadow DOM
            class XShader extends HTMLElement {
                connectedCallback() {
                    this.attachShadow({ mode: "open" });
                    const canvas = document.createElement("canvas");
                    canvas.width = 300;
                    canvas.height = 400;
                    canvas.style.display = "block";
                    this.shadowRoot.appendChild(canvas);
                    this.canvas = canvas;
                }
            }
            customElements.define("x-shader", XShader);

            await init();
            const renderer = await Renderer.create();

            // Initialize cards
            for (const el of document.querySelectorAll("x-shader")) {
                await renderer.add_card(el.canvas);
            }

            // Render loop
            let lastTime = performance.now();
            function loop(now) {
                const dt = now - lastTime;
                lastTime = now;
                renderer.tick(Math.floor(dt));
                renderer.render_frame();
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);

            // Mouse parallax
            document.addEventListener("mousemove", (e) => {
                const deck = document.querySelector(".deck");
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                deck.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // ── WebSocket connection ──
            const wsUrl = `ws://${location.hostname}:3001/ws`;
            const connected = renderer.connect(wsUrl);
            updateConnectionStatus(connected);

            function updateConnectionStatus(isConnected) {
                const dot = document.getElementById("connection-dot");
                const label = document.getElementById("connection-label");
                if (isConnected) {
                    dot.classList.add("connected");
                    label.textContent = "Connected";
                } else {
                    dot.classList.remove("connected");
                    label.textContent = "Disconnected";
                }
            }

            // ── Input bar ──
            const inputField = document.getElementById("input-field");
            const sendBtn = document.getElementById("send-btn");
            const responseArea = document.getElementById("response-area");
            const busyIndicator = document.getElementById("busy-indicator");
            const busyLabel = document.getElementById("busy-label");
            const tasksLabel = document.getElementById("tasks-label");
            const modelLabel = document.getElementById("model-label");

            function handleSubmit() {
                const text = inputField.value.trim();
                if (!text) return;

                inputField.value = "";
                responseArea.textContent = "";
                responseArea.classList.add("visible");

                // Show busy indicator
                busyIndicator.classList.add("active");
                busyLabel.textContent = "thinking...";

                // Route through the renderer
                const result = renderer.query(text);
                console.log("Query result:", result);

                // Update model label from routing
                if (result.includes("remote")) {
                    modelLabel.textContent = "gemini-flash";
                } else if (result.includes("local")) {
                    modelLabel.textContent = "qwen-local";
                }
            }

            inputField.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            sendBtn.addEventListener("click", handleSubmit);

            // ── Listen for server messages via polling ──
            // (In production, this would use wasm_bindgen closures for push callbacks)
            // For now, connection status is checked periodically
            setInterval(() => {
                updateConnectionStatus(renderer.is_connected());
            }, 3000);
        </script>
    </body>
</html>
