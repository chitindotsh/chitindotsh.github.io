<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Superorganism</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            body {
                background: #000;
                color: #e0e0e0;
                font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* ── Card deck ── */
            .deck-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding-bottom: 120px;
            }

            .deck {
                display: flex;
                gap: 24px;
            }

            .card {
                width: 300px;
                height: 400px;
                border-radius: 16px;
                background: #fff;
                box-shadow:
                    0 4px 20px rgba(160, 60, 200, 0.15),
                    0 8px 40px rgba(180, 80, 220, 0.10);
                overflow: hidden;
                transition: box-shadow 0.3s ease;
            }

            .card:hover {
                box-shadow:
                    0 6px 28px rgba(160, 60, 200, 0.25),
                    0 12px 50px rgba(180, 80, 220, 0.15);
            }

            /* ── Bottom UI ── */
            #bottom-ui {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 100;
            }

            /* Busy indicator */
            #busy-indicator {
                height: 0;
                overflow: hidden;
                background: rgba(0, 0, 0, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                transition: height 0.3s ease;
            }

            #busy-indicator.active {
                height: 36px;
            }

            #busy-label {
                font-size: 12px;
                color: #8a7a9a;
                letter-spacing: 0.5px;
            }

            @keyframes shimmer {
                0%   { background-position: -200px 0; }
                100% { background-position: 200px 0; }
            }

            .shimmer-bar {
                width: 120px;
                height: 3px;
                border-radius: 2px;
                background: linear-gradient(
                    90deg,
                    rgba(160, 60, 200, 0.3) 0%,
                    rgba(200, 100, 240, 0.6) 50%,
                    rgba(160, 60, 200, 0.3) 100%
                );
                background-size: 200px 100%;
                animation: shimmer 1.5s infinite linear;
            }

            @keyframes pulse-dot {
                0%, 100% { opacity: 0.3; }
                50%      { opacity: 1; }
            }

            .thinking-dots {
                display: flex;
                gap: 4px;
            }

            .thinking-dots span {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: #a040c8;
                animation: pulse-dot 1.2s infinite;
            }

            .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
            .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

            /* Input bar — centered pill */
            #input-bar {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 16px 24px 12px;
            }

            #input-pill {
                display: flex;
                align-items: center;
                gap: 8px;
                width: min(90vw, 600px);
                background: #18161c;
                border: 1px solid #2a2530;
                border-radius: 999px;
                padding: 6px 6px 6px 20px;
                transition: border-color 0.2s;
            }

            #input-pill:focus-within {
                border-color: rgba(160, 60, 200, 0.5);
            }

            #input-icon {
                font-size: 14px;
                color: #a040c8;
                flex-shrink: 0;
            }

            #input-field {
                flex: 1;
                background: transparent;
                border: none;
                padding: 8px 4px;
                color: #e0e0e0;
                font-family: inherit;
                font-size: 14px;
                outline: none;
            }

            #input-field::placeholder {
                color: #555;
            }

            #send-btn {
                background: #a040c8;
                border: none;
                border-radius: 999px;
                padding: 8px 18px;
                color: white;
                font-family: inherit;
                font-size: 13px;
                cursor: pointer;
                flex-shrink: 0;
                transition: background 0.2s;
            }

            #send-btn:hover {
                background: #b050d8;
            }

            #send-btn:active {
                background: #8030a0;
            }

            /* Status bar */
            #status-bar {
                background: rgba(0, 0, 0, 0.95);
                height: 24px;
                display: flex;
                align-items: center;
                padding: 0 12px;
                font-size: 11px;
                color: #555;
                gap: 12px;
            }

            .status-section {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .status-dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: #553;
                transition: background 0.3s;
            }

            .status-dot.connected {
                background: #6a4;
            }

            #status-connection {
                flex-shrink: 0;
            }

            #status-tasks {
                flex: 1;
                text-align: center;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            #status-model {
                flex-shrink: 0;
                text-align: right;
            }

            /* ── Response area ── */
            #response-area {
                position: fixed;
                bottom: 120px;
                left: 50%;
                transform: translateX(-50%);
                width: min(90vw, 700px);
                max-height: 300px;
                overflow-y: auto;
                background: #110f14;
                border: 1px solid #2a2530;
                border-radius: 12px;
                padding: 16px;
                font-size: 14px;
                line-height: 1.6;
                color: #ccc;
                display: none;
                z-index: 50;
            }

            #response-area.visible {
                display: block;
            }

            #response-area .token {
                color: #e0e0e0;
            }
        </style>
    </head>
    <body>
        <div class="deck-container">
            <div class="deck">
                <div class="card"><x-shader></x-shader></div>
                <div class="card"><x-shader></x-shader></div>
                <div class="card"><x-shader></x-shader></div>
            </div>
        </div>

        <!-- Response area -->
        <div id="response-area"></div>

        <!-- Bottom UI -->
        <div id="bottom-ui">
            <!-- Busy indicator -->
            <div id="busy-indicator">
                <div class="thinking-dots">
                    <span></span><span></span><span></span>
                </div>
                <span id="busy-label">thinking remotely...</span>
                <div class="shimmer-bar"></div>
            </div>

            <!-- Input bar -->
            <div id="input-bar">
                <div id="input-pill">
                    <span id="input-icon">&#9672;</span>
                    <input id="input-field" type="text" placeholder="Ask the superorganism..." autocomplete="off" />
                    <button id="send-btn">Send</button>
                </div>
            </div>

            <!-- Status bar -->
            <div id="status-bar">
                <div class="status-section" id="status-connection">
                    <div class="status-dot" id="connection-dot"></div>
                    <span id="connection-label">Disconnected</span>
                </div>
                <div class="status-section" id="status-tasks">
                    <span id="tasks-label">No active tasks</span>
                </div>
                <div class="status-section" id="status-model">
                    <span id="model-label">auto</span>
                </div>
            </div>
        </div>

        <script type="module">
            import init, { Renderer } from "./pkg/xenomolt.js";

            // Web component: creates canvas in shadow DOM
            class XShader extends HTMLElement {
                connectedCallback() {
                    this.attachShadow({ mode: "open" });
                    const canvas = document.createElement("canvas");
                    canvas.width = 300;
                    canvas.height = 400;
                    canvas.style.display = "block";
                    this.shadowRoot.appendChild(canvas);
                    this.canvas = canvas;
                }
            }
            customElements.define("x-shader", XShader);

            await init();
            const renderer = await Renderer.create();

            // Initialize cards
            for (const el of document.querySelectorAll("x-shader")) {
                await renderer.add_card(el.canvas);
            }

            // Render loop
            let lastTime = performance.now();
            function loop(now) {
                const dt = now - lastTime;
                lastTime = now;
                renderer.tick(Math.floor(dt));
                renderer.render_frame();
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);

            // ── WebSocket connection ──
            const wsUrl = `ws://${location.hostname}:3001/ws`;
            const connected = renderer.connect(wsUrl);
            updateConnectionStatus(connected);

            function updateConnectionStatus(isConnected) {
                const dot = document.getElementById("connection-dot");
                const label = document.getElementById("connection-label");
                if (isConnected) {
                    dot.classList.add("connected");
                    label.textContent = "Connected";
                } else {
                    dot.classList.remove("connected");
                    label.textContent = "Disconnected";
                }
            }

            // ── Input bar ──
            const inputField = document.getElementById("input-field");
            const sendBtn = document.getElementById("send-btn");
            const responseArea = document.getElementById("response-area");
            const busyIndicator = document.getElementById("busy-indicator");
            const busyLabel = document.getElementById("busy-label");
            const tasksLabel = document.getElementById("tasks-label");
            const modelLabel = document.getElementById("model-label");

            function handleSubmit() {
                const text = inputField.value.trim();
                if (!text) return;

                inputField.value = "";
                responseArea.textContent = "";
                responseArea.classList.add("visible");

                // Show busy indicator
                busyIndicator.classList.add("active");
                busyLabel.textContent = "thinking...";

                // Route through the renderer (also triggers card swap)
                const result = renderer.query(text);
                console.log("Query result:", result);

                // Update model label from routing
                if (result.includes("remote")) {
                    modelLabel.textContent = "gemini-flash";
                } else if (result.includes("local")) {
                    modelLabel.textContent = "qwen-local";
                }
            }

            // Listen for WorkspaceResponse messages from WebSocket
            // The WS message handler in Rust calls back, but we also need
            // a JS-side listener to forward workspace data to the renderer
            function setupWorkspaceListener() {
                const wsUrl = `ws://${location.hostname}:3001/ws`;
                try {
                    const rawWs = new WebSocket(wsUrl);
                    rawWs.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);
                            if (msg.type === "WorkspaceResponse") {
                                console.log("WorkspaceResponse received:", msg.request_id);
                                renderer.update_card_data(JSON.stringify(msg.data));
                                busyIndicator.classList.remove("active");
                            }
                            if (msg.type === "ChatToken") {
                                responseArea.textContent += msg.text;
                            }
                            if (msg.type === "ChatComplete") {
                                busyIndicator.classList.remove("active");
                            }
                            if (msg.type === "TaskStatusBatch" && msg.tasks) {
                                const active = msg.tasks.filter(t => t.status === "Running");
                                if (active.length > 0) {
                                    tasksLabel.textContent = active[0].status_line || "Working...";
                                } else {
                                    tasksLabel.textContent = "No active tasks";
                                }
                            }
                        } catch (e) {
                            // Not JSON or parse error — ignore
                        }
                    };
                } catch (e) {
                    console.log("Workspace listener setup skipped:", e);
                }
            }
            setupWorkspaceListener();

            inputField.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            sendBtn.addEventListener("click", handleSubmit);

            // ── Listen for server messages via polling ──
            // (In production, this would use wasm_bindgen closures for push callbacks)
            // For now, connection status is checked periodically
            setInterval(() => {
                updateConnectionStatus(renderer.is_connected());
            }, 3000);
        </script>
    </body>
</html>
